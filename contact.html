<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Matcha & Crumbs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">Matcha & Crumbs</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <main>
        <h2>Say Hello</h2>
        <p style="margin-bottom: 2rem;">Want to place a custom order or just talk about cupcakes? Drop us a line.</p>
        
        <form class="contact-form" action="#" method="POST">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit" class="btn" style="border: none; cursor: pointer; font-family: inherit;">Send Message</button>
        </form>
    </main>

    </footer>
</body>
